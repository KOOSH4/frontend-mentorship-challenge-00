<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />

  </head>
  <body>
    <main>
      <h2>Task Box</h2>
      <section>
        <div class="form-group">

            <li>Task 1</li>
            <div>
              <button type="submit" class="btn-edit">Edit</button>

            </div>
          </ul>
          <ul>
            <li>Task 2</li>
            <div>
              <button type="submit" class="btn-edit">Edit</button>
              <button type="submit" class="btn-delete">Delete</button>
            </div>
          </ul>
          <ul>
            <li>Task 3</li>
            <div>
              <button type="submit" class="btn-edit">Edit</button>
              <button type="submit" class="btn-delete">Delete</button>
            </div>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
